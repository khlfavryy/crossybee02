<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee Crossy Road - Mobile Friendly</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2c3e50, #0f171e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        #game-container {
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border-radius: 16px;
            overflow: hidden;
            background-color: #55b02e;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 700px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .ui-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 15px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 800;
        }
        .ui-box span { color: #ffd700; }

        #touch-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 12px;
            opacity: 0.85;
            z-index: 20;
            pointer-events: auto;
        }

        .touch-btn {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0.9);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* Touch controls hanya disembunyikan jika perangkat memang tidak punya layar sentuh */
        @media (hover: hover) and (pointer: fine) {
            #touch-controls { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="ui-box">LV: <span id="level">1</span></div>
            <div class="ui-box">SCORE: <span id="score">0</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="touch-controls">
            <div class="touch-btn" id="btn-up">⬆️</div>
            <div class="touch-btn" id="btn-left">⬅️</div>
            <div class="touch-btn" id="btn-down">⬇️</div>
            <div class="touch-btn" id="btn-right">➡️</div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");
const levelElement = document.getElementById("level");
const gameContainer = document.getElementById("game-container");

const GRID_SIZE = 50;
const DISTANCE_TO_HIVE = 15;

let COLS;
let player;
let rows = [];
let cameraY = 0;
let score = 0;
let currentLevel = 1;
let gameOver = false;

function resizeCanvas() {
    const rect = gameContainer.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    COLS = Math.floor(canvas.width / GRID_SIZE);
}

class Bee {
    constructor() {
        this.reset();
    }

    reset() {
        this.gridX = Math.floor(COLS / 2);
        this.gridY = 2;
        this.x = this.gridX * GRID_SIZE;
        this.y = canvas.height - (this.gridY * GRID_SIZE);
        this.wingWave = 0;
    }

    update() {
        const targetX = this.gridX * GRID_SIZE + 5;
        const targetY = canvas.height - (this.gridY * GRID_SIZE) + 5;
        this.x += (targetX - this.x) * 0.25;
        this.y += (targetY - this.y) * 0.25;
        this.wingWave += 0.4;
    }

    draw() {
        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.beginPath();
        ctx.ellipse(this.x + 20, this.y + 28, 14, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        let bodyGrad = ctx.createRadialGradient(this.x+15, this.y+15, 2, this.x+20, this.y+20, 18);
        bodyGrad.addColorStop(0, '#FFE875');
        bodyGrad.addColorStop(1, '#F39C12');
        ctx.fillStyle = bodyGrad;
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#34495E';
        ctx.beginPath();
        ctx.ellipse(this.x + 20, this.y + 18, 18, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#2C3E50";
        ctx.fillRect(this.x + 12, this.y + 5, 4, 26);
        ctx.fillRect(this.x + 22, this.y + 5, 4, 26);

        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(this.x + 32, this.y + 13, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(236, 240, 241, 0.8)";
        let wingOffset = Math.sin(this.wingWave) * 3;

        ctx.beginPath();
        ctx.ellipse(this.x + 14, this.y + 4, 7, 12 + wingOffset, -Math.PI/5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(this.x + 24, this.y + 4, 7, 12 - wingOffset, Math.PI/5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }
}

class Row {
    constructor(gridY, level) {
        this.gridY = gridY;
        this.y = canvas.height - (gridY * GRID_SIZE);
        this.flowers = [];

        if (gridY > 2 && (gridY - 2) % DISTANCE_TO_HIVE === 0) {
            this.type = 'hive-lane';
        } else {
            this.type = Math.random() > 0.4 ? 'flower-lane' : 'safe-lane';
        }

        let baseSpeed = Math.random() * 1.5 + 1.2;
        let speedMultiplier = 1 + (level - 1) * 0.3;
        this.speed = baseSpeed * speedMultiplier * (Math.random() > 0.5 ? 1 : -1);

        if (this.type === 'flower-lane') {
            let count = Math.floor(Math.random() * 2) + 2;
            const colors = ['#FF4757', '#9B59B6', '#3498DB'];
            const shapes = ['round', 'star'];

            for(let i = 0; i < count; i++) {
                this.flowers.push({
                    x: Math.random() * canvas.width,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    shape: shapes[Math.floor(Math.random() * shapes.length)],
                    petals: Math.floor(Math.random() * 2) + 5,
                    rotation: Math.random() * Math.PI
                });
            }
        }
    }

    update() {
        if (this.type === 'flower-lane') {
            this.flowers.forEach(flower => {
                flower.x += this.speed;
                flower.rotation += 0.02;
                if (flower.x > canvas.width + 50) flower.x = -50;
                if (flower.x < -50) flower.x = canvas.width + 50;
            });
        }
    }

    draw() {
        if (this.type === 'safe-lane') {
            ctx.fillStyle = "#479b24";
            ctx.fillRect(0, this.y + cameraY, canvas.width, GRID_SIZE);
            ctx.fillStyle = "#7f8c8d";
            for(let i = 15; i < canvas.width; i += 60) {
                ctx.beginPath();
                ctx.ellipse(i, this.y + cameraY + 25, 16, 10, 0, 0, Math.PI*2);
                ctx.fill();
            }
        } else if (this.type === 'hive-lane') {
            let hiveGrad = ctx.createLinearGradient(0, this.y + cameraY, 0, this.y + cameraY + GRID_SIZE);
            hiveGrad.addColorStop(0, '#F39C12');
            hiveGrad.addColorStop(1, '#D35400');
            ctx.fillStyle = hiveGrad;
            ctx.fillRect(0, this.y + cameraY, canvas.width, GRID_SIZE);
        } else {
            ctx.fillStyle = "#55b02e";
            ctx.fillRect(0, this.y + cameraY, canvas.width, GRID_SIZE);
            ctx.fillStyle = "rgba(255,255,255,0.05)";
            for(let i = 0; i < canvas.width; i += 50) {
                if((i/50 + this.gridY) % 2 === 0) {
                    ctx.fillRect(i, this.y + cameraY, 50, GRID_SIZE);
                }
            }
        }

        ctx.strokeStyle = "rgba(0,0,0,0.04)";
        ctx.lineWidth = 1;
        ctx.strokeRect(0, this.y + cameraY, canvas.width, GRID_SIZE);

        if (this.type === 'hive-lane') {
            ctx.save();
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.font = "italic bold 16px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.fillText("✦ BEE HIVE ✦", canvas.width / 2, this.y + cameraY + 31);

            ctx.strokeStyle = "#FFF";
            ctx.lineWidth = 2;
            for(let bx = 30; bx < canvas.width; bx += 80) {
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.arc(bx, this.y + cameraY + 25, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
            }
            ctx.restore();
        }

        if (this.type === 'flower-lane') {
            this.flowers.forEach(flower => {
                let fx = flower.x;
                let fy = this.y + cameraY + 25;
                ctx.save();
                ctx.translate(fx, fy);
                ctx.rotate(flower.rotation);
                ctx.fillStyle = flower.color;
                ctx.strokeStyle = "rgba(0,0,0,0.15)";
                ctx.lineWidth = 1.5;

                if (flower.shape === 'round') {
                    for (let i = 0; i < flower.petals; i++) {
                        ctx.rotate((Math.PI * 2) / flower.petals);
                        ctx.beginPath();
                        ctx.ellipse(12, 0, 9, 6, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                } else {
                    for (let i = 0; i < flower.petals; i++) {
                        ctx.rotate((Math.PI * 2) / flower.petals);
                        ctx.beginPath();
                        ctx.moveTo(0, -6);
                        ctx.lineTo(18, 0);
                        ctx.lineTo(0, 6);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }
                }
                ctx.fillStyle = "#FFFF00";
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });
        }
    }
}

function init() {
    resizeCanvas();
    player = new Bee();
    rows = [];
    cameraY = 0;
    score = 0;
    currentLevel = 1;
    gameOver = false;

    for (let i = 0; i < 20; i++) {
        let newRow = new Row(i, currentLevel);
        if (i <= 2) {
            newRow.type = 'safe-lane';
            newRow.flowers = [];
        }
        rows.push(newRow);
    }
}

function movePlayer(dir) {
    if (gameOver) {
        init();
        return;
    }

    if (dir === "up") {
        player.gridY++;
        let currentStep = player.gridY - 2;
        if(currentStep > score) score = currentStep;

        if (currentStep > 0 && currentStep % DISTANCE_TO_HIVE === 0) {
            let calculatedLevel = Math.floor(currentStep / DISTANCE_TO_HIVE) + 1;
            if (calculatedLevel > currentLevel) {
                currentLevel = calculatedLevel;
            }
        }
    }
    else if (dir === "down") {
        if (player.gridY > 2) player.gridY--;
    }
    else if (dir === "left") {
        if (player.gridX > 0) player.gridX--;
    }
    else if (dir === "right") {
        if (player.gridX < COLS - 1) player.gridX++;
    }
}

// Keyboard (desktop)
window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") movePlayer("up");
    else if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") movePlayer("down");
    else if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") movePlayer("left");
    else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") movePlayer("right");
    else if (gameOver) init();
});

// Touch controls (mobile)
function setupTouchBtn(btnId, direction) {
    const btn = document.getElementById(btnId);
    btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        movePlayer(direction);
    });
}

setupTouchBtn('btn-up', 'up');
setupTouchBtn('btn-down', 'down');
setupTouchBtn('btn-left', 'left');
setupTouchBtn('btn-right', 'right');

// Swipe gesture di canvas untuk mobile
let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener('pointerdown', (e) => {
    if (gameOver) {
        e.preventDefault();
        init();
        return;
    }
    touchStartX = e.clientX;
    touchStartY = e.clientY;
});

canvas.addEventListener('pointerup', (e) => {
    if (gameOver) return;
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    const threshold = 30;

    if (Math.max(absDx, absDy) < threshold) return;

    if (absDx > absDy) {
        movePlayer(dx > 0 ? "right" : "left");
    } else {
        movePlayer(dy > 0 ? "down" : "up");
    }
});

// Resize responsif saat rotasi layar / ubah ukuran window
window.addEventListener('resize', () => {
    resizeCanvas();
});

function checkCollision() {
    let playerRow = rows.find(r => r.gridY === player.gridY);
    if (playerRow && playerRow.type === 'flower-lane') {
        playerRow.flowers.forEach(flower => {
            let pX = player.x + 20;
            let pY = player.y + 20;
            let fX = flower.x;
            let fY = playerRow.y + 25;

            let dist = Math.hypot(pX - fX, pY - fY);
            if (dist < 26) {
                gameOver = true;
            }
        });
    }
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let highestRowY = rows[rows.length - 1].gridY;
    if (player.gridY > highestRowY - 10) {
        for (let i = 1; i <= 10; i++) {
            rows.push(new Row(highestRowY + i, currentLevel));
        }
    }

    let targetCameraY = (player.gridY * GRID_SIZE) - canvas.height + 250;
    cameraY += (targetCameraY - cameraY) * 0.08;

    rows.forEach(row => {
        row.update();
        row.draw();
    });

    player.update();

    ctx.save();
    ctx.translate(0, cameraY);
    player.draw();
    ctx.restore();

    checkCollision();

    scoreElement.innerText = score;
    levelElement.innerText = currentLevel;

    if (gameOver) {
        ctx.fillStyle = "rgba(15, 23, 30, 0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#FF4757";
        ctx.font = "bold 24px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.fillText("YOU KILLED THE BEE!", canvas.width / 2, canvas.height / 2 - 40);

        ctx.fillStyle = "#FFD700";
        ctx.font = "600 18px 'Segoe UI'";
        ctx.fillText(`Score: ${score}  |  Level: ${currentLevel}`, canvas.width / 2, canvas.height / 2 + 10);

        ctx.fillStyle = "#FFF";
        ctx.font = "16px 'Segoe UI'";
        ctx.fillText("Tap anywhere to restart", canvas.width / 2, canvas.height / 2 + 60);
    }

    requestAnimationFrame(gameLoop);
}

init();
gameLoop();
</script>

</body>
</html>
